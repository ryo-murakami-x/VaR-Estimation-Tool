name: Tests and Quality Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.7', '3.8', '3.9', '3.10', '3.11']
        exclude:
          # Reduce test matrix for faster CI
          - os: macos-latest
            python-version: '3.7'
          - os: windows-latest
            python-version: '3.7'

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Display Python version
      run: python -c "import sys; print(sys.version)"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8 (if available)
      run: |
        pip install flake8 || true
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true
      continue-on-error: true
    
    - name: Run integration tests
      run: python integration_test.py
    
    - name: Test data reader module
      run: python -c "from data_reader import StooqDataReader; print('✓ Data reader module imports correctly')"
    
    - name: Test VaR calculator module
      run: python -c "from var_calculator import MonteCarloVaR; print('✓ VaR calculator module imports correctly')"
    
    - name: Test GUI module (import only)
      run: python -c "from var_gui import VaREstimationGUI; print('✓ GUI module imports correctly')"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint flake8 mypy || true
    
    - name: Analyze with pylint (if available)
      run: |
        pylint *.py || true
      continue-on-error: true
    
    - name: Check with flake8 (if available)
      run: |
        flake8 *.py --max-line-length=100 || true
      continue-on-error: true
    
    - name: Type check with mypy (if available)
      run: |
        mypy *.py || true
      continue-on-error: true

  build-docs:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Check documentation
      run: |
        if [ ! -f "README.md" ]; then exit 1; fi
        if [ ! -f "QUICKSTART.md" ]; then exit 1; fi
        if [ ! -f "INSTALLATION.md" ]; then exit 1; fi
        echo "✓ All documentation files present"
    
    - name: Validate markdown
      run: |
        pip install mdl || true
        mdl *.md || true
      continue-on-error: true
